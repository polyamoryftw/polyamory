# CloudCannon config for fully editable Polyamory content.
# This exposes data/site.json as the editable source of truth.

source: /
paths:
  uploads: assets/uploads
  static: /

collections_config:
  site_data:
    name: Site Editor
    singular_name: Site Content
    path: data
    glob:
      - site.json
    disable_url: true
    icon: dashboard_customize
    _enabled_editors:
      - data
    preview:
      text:
        - key: siteTitle
      subtext:
        - key: tagline
      icon: auto_awesome

collection_groups:
  - heading: Polyamory
    collections:
      - site_data

_inputs:
  siteTitle:
    label: Site Title
    type: text
  tagline:
    label: Site Description
    type: text
  youtubeUrl:
    label: Main YouTube URL
    type: url

  nav:
    label: Navigation
    type: object
    comment: Edit the brand and top navigation links.
  brand:
    label: Brand Text
    type: text
  items:
    label: Navigation Items
    type: array
    comment: Drag to reorder navigation items.
  target:
    label: Section Target
    type: select
    options:
      values:
        - hq
        - music
        - archive
        - live
        - store
  visible:
    label: Visible
    type: switch
  order:
    label: Display Order
    type: number

  hero:
    label: Hero Text
    type: object
  overline:
    label: Overline
    type: text
  title:
    label: Title
    type: text
  emailPlaceholder:
    label: Email Placeholder
    type: text
  buttonText:
    label: Button Text
    type: text
  launchNote:
    label: Launch Note
    type: text
  scrollTarget:
    label: Scroll Target
    type: select
    options:
      values:
        - hq
        - music
        - archive
        - live
        - store

  sections:
    label: Sections
    type: array
    comment: Drag these to reorder site sections. Set Visible off to hide a section.
    options:
      structures:
        values:
          - label: Mailing List Section
            value:
              id: hq
              visible: true
              order: 1
              eyebrow:
              title:
              introTitle:
              body:
              emailPlaceholder:
              buttonText:
          - label: Videos Section
            value:
              id: music
              visible: true
              order: 2
              eyebrow:
              title:
          - label: Archive Section
            value:
              id: archive
              visible: true
              order: 3
              eyebrow:
              title:
          - label: Live Section
            value:
              id: live
              visible: true
              order: 4
              eyebrow:
              title:
          - label: Store Section
            value:
              id: store
              visible: true
              order: 5
              eyebrow:
              title:
              shopifyTitle:
              shopifyBody:
  id:
    label: Section ID
    type: select
    options:
      values:
        - hq
        - music
        - archive
        - live
        - store
  eyebrow:
    label: Small Heading
    type: text
  introTitle:
    label: Intro Title
    type: text
  body:
    label: Body Text
    type: textarea
  shopifyTitle:
    label: Shopify Note Title
    type: text
  shopifyBody:
    label: Shopify Note Body
    type: textarea

  links:
    label: Social / External Links
    type: object
  spotify:
    label: Spotify URL
    type: url
  instagram:
    label: Instagram URL
    type: url
  youtube:
    label: YouTube URL
    type: url
  shopify:
    label: Shopify Store URL
    type: url

  features:
    label: Archive Cards
    type: array
    comment: Drag to reorder archive cards.
  videos:
    label: Videos
    type: array
    comment: Drag to reorder videos.
  shows:
    label: Live Shows
    type: array
    comment: Drag to reorder live dates.
  merch:
    label: Merch
    type: array
    comment: Drag to reorder merch items.

  subtitle:
    label: Subtitle
    type: text
  label:
    label: Label
    type: text
  youtubeId:
    label: YouTube ID
    type: text
    comment: Example: fPq_EjGA-R4
  url:
    label: URL
    type: url
  date:
    label: Date
    type: text
  city:
    label: City
    type: text
  venue:
    label: Venue
    type: text
  name:
    label: Name
    type: text
  price:
    label: Price
    type: text
  image:
    label: Image
    type: image
    options:
      path: assets/uploads
      uploads_use_relative_path: true

  footer:
    label: Footer
    type: object
  left:
    label: Left Footer Text
    type: text
  right:
    label: Right Footer Text
    type: text
