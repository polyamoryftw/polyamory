# CloudCannon enhanced config for Polyamory
# Copy this file to the ROOT of your GitHub repo.
# This file only configures editing. It does not change the website design or data.

source: /
base_url: https://polyamoryv1.netlify.app

paths:
  uploads: assets/uploads
  static: /

collections_config:
  site_data:
    name: Site Editor
    singular_name: Site Content
    path: data
    glob:
      - site.json
    disable_url: true
    icon: dashboard_customize
    _enabled_editors:
      - data
    preview:
      text:
        - key: siteTitle
      subtext:
        - key: tagline
      icon: auto_awesome

collection_groups:
  - heading: Polyamory
    collections:
      - site_data

_structures:
  links:
    values:
      - label: Social Links
        icon: link
        value:
          spotify:
          instagram:
          youtube:
          shopify:

_editables:
  content:
    link: true
    blockquote: false
    bold: true
    italic: true
    removeformat: true

_inputs:
  siteTitle:
    label: Site Title
    type: text
    comment: Main wordmark / browser title.

  tagline:
    label: Tagline
    type: text
    comment: Short line used for site description and launch messaging.

  youtubeUrl:
    label: Main YouTube URL
    type: url
    comment: Main video link.

  links:
    label: Social / External Links
    type: object
    options:
      preview:
        text:
          - Spotify / Instagram / YouTube / Shopify
    comment: Paste full URLs for external platforms.

  spotify:
    label: Spotify URL
    type: url
  instagram:
    label: Instagram URL
    type: url
  youtube:
    label: YouTube URL
    type: url
  shopify:
    label: Shopify Store URL
    type: url

  features:
    label: Archive Cards
    type: array
    comment: Cards in the visual archive section. Drag items to reorder.
    options:
      structures:
        values:
          - label: Archive Card
            icon: image
            value:
              title:
              subtitle:
              image:
              url:
      preview:
        text:
          - key: title
        subtext:
          - key: subtitle
        image:
          - key: image

  videos:
    label: Videos
    type: array
    comment: Videos shown in the side player. Drag items to reorder.
    options:
      structures:
        values:
          - label: Video
            icon: smart_display
            value:
              title:
              label:
              youtubeId:
              url:
              image:
      preview:
        text:
          - key: title
        subtext:
          - key: label
        image:
          - key: image

  shows:
    label: Live Shows
    type: array
    comment: Live dates. Drag items to reorder.
    options:
      structures:
        values:
          - label: Show
            icon: event
            value:
              date:
              city:
              venue:
              url:
      preview:
        text:
          - key: city
        subtext:
          - key: venue

  merch:
    label: Merch
    type: array
    comment: Merch/product cards. Drag items to reorder.
    options:
      structures:
        values:
          - label: Merch Item
            icon: shopping_bag
            value:
              name:
              price:
              image:
              url:
      preview:
        text:
          - key: name
        subtext:
          - key: price
        image:
          - key: image

  title:
    label: Title
    type: text
  subtitle:
    label: Subtitle
    type: text
  label:
    label: Label
    type: text
    comment: Example: Video 001
  youtubeId:
    label: YouTube ID
    type: text
    comment: Use only the ID, not the whole URL. Example: fPq_EjGA-R4
  url:
    label: URL
    type: url
  date:
    label: Date
    type: text
    comment: Example: 24 MAY
  city:
    label: City
    type: text
  venue:
    label: Venue
    type: text
  name:
    label: Name
    type: text
  price:
    label: Price
    type: text
    comment: Example: £35
  image:
    label: Image
    type: image
    comment: Upload or select an image. Uploaded images go into assets/uploads.
    options:
      path: assets/uploads
      uploads_use_relative_path: true
      empty_type: string

_snippets_imports:
  cloudcannon: true
